<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Report Generator | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kadwa:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <main class="dashboard">
      <header class="topbar">
        <div class="brand">
          <img src="logo.png" alt="" class="brand__logo" />
          <div>
            <h1>Academic Report Generator</h1>
            <p>Manage records and analyze performance quickly</p>
          </div>
        </div>
        <div class="topbar__actions">
          <button id="toggleCreateBtn" type="button" class="btn">+ Create Record</button>
          <a class="topbar__link" href="index.html">Back to Login</a>
        </div>
      </header>

      <section class="panel is-hidden" id="createPanel">
        <h2>Create Record</h2>
        <form id="recordForm" class="record-form" novalidate>
          <label>
            <span>Student Name</span>
            <input type="text" id="studentName" name="studentName" placeholder="Enter student name" required />
          </label>
          <label>
            <span>Register Number</span>
            <input type="text" id="registerNumber" name="registerNumber" placeholder="6A-001" required />
          </label>
          <label>
            <span>Class</span>
            <select id="className" name="className" required>
              <option value="">Select class</option>
              <option>Class 6A</option>
              <option>Class 6B</option>
              <option>Class 6C</option>
              <option>Class 7A</option>
              <option>Class 7B</option>
              <option>Class 7C</option>
              <option>Class 8A</option>
              <option>Class 8B</option>
              <option>Class 8C</option>
              <option>Class 9A</option>
              <option>Class 9B</option>
              <option>Class 9C</option>
              <option>Class 10A</option>
              <option>Class 10B</option>
              <option>Class 10C</option>
              <option>Class 11A</option>
              <option>Class 11B</option>
              <option>Class 11C</option>
              <option>Class 12A</option>
              <option>Class 12B</option>
              <option>Class 12C</option>
            </select>
          </label>
          <label>
            <span>Section</span>
            <select id="sectionName" name="sectionName" required>
              <option value="">Select section</option>
              <option>A</option>
              <option>B</option>
              <option>C</option>
            </select>
          </label>
          <label>
            <span>Subject</span>
            <select id="subjectName" name="subjectName" required>
              <option value="">Select subject</option>
              <option>Tamil</option>
              <option>English</option>
              <option>Mathematics</option>
              <option>Physics</option>
              <option>Chemistry</option>
              <option>Biology</option>
            </select>
          </label>
          <label>
            <span>Class Teacher Name</span>
            <input type="text" id="classTeacherName" name="classTeacherName" placeholder="e.g., Priya M" required />
          </label>
          <label>
            <span>Class Teacher Subject</span>
            <select id="classTeacherSubject" name="classTeacherSubject" required>
              <option value="">Select subject</option>
              <option>Tamil</option>
              <option>English</option>
              <option>Mathematics</option>
              <option>Physics</option>
              <option>Chemistry</option>
              <option>Biology</option>
            </select>
          </label>
          <label>
            <span>Term</span>
            <select id="termName" name="termName" required>
              <option value="">Select term</option>
              <option>Term 1</option>
              <option>Term 2</option>
              <option>Term 3</option>
            </select>
          </label>
          <label>
            <span>Marks</span>
            <input type="number" id="marks" name="marks" min="0" max="100" placeholder="0-100" required />
          </label>
          <label class="auto-fill">
            <input type="checkbox" id="autoFillAll" name="autoFillAll" />
            <span>Auto-fill all subjects &amp; terms (random marks)</span>
          </label>
          <button type="submit" class="btn btn--small">Add Record</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel__head">
          <h2>Your Reports</h2>
          <div class="head-controls">
            <label>
              <span>View</span>
              <select id="viewMode">
                <option value="classRecords">Class-wise Records</option>
                <option value="studentReport">Student Report</option>
              </select>
            </label>
            <label>
              <span>Class</span>
              <select id="classFilter">
                <option value="all">All Classes</option>
              </select>
            </label>
            <label>
              <span>Section</span>
              <select id="sectionFilter">
                <option value="all">All Sections</option>
              </select>
            </label>
          </div>
        </div>

        <div class="view-body">
          <section class="view-pane is-active" data-view="classRecords">
            <div id="classWiseView" class="records"></div>
          </section>

          <section class="view-pane" data-view="studentReport">
            <div class="specific-controls">
              <label>
                <span>Register Number</span>
                <select id="studentFilter">
                  <option value="">Select register number</option>
                </select>
              </label>
              <label>
                <span>Term</span>
                <select id="studentTermFilter">
                  <option value="">Select term</option>
                </select>
              </label>
              <button id="downloadStudentReportBtn" type="button" class="btn btn--small">Download Marksheet</button>
            </div>
            <div class="specific-controls specific-controls--meta">
              <label>
                <span>Academic Year</span>
                <input id="academicYearInput" type="text" placeholder="2026-2027" />
              </label>
              <button id="downloadStudentReportPdfBtn" type="button" class="btn btn--small">Download PDF</button>
            </div>
            <div id="studentReportView" class="records"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="dashboard.js?v=20260312"></script>
  </body>
</html>
